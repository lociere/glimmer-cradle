# Cognition 推理、注意力、上下文与多模态策略。

model:
  max_tokens: 1024
  temperature: 0.8
  top_p: 0.9
  frequency_penalty: 0.0

life_clock:
  heartbeat_enabled: false
  heartbeat_interval_ms: 45000
  focus_duration_ms: 20000
  ingress_debounce_ms: 1400
  ingress_focused_debounce_ms: 700
  ingress_max_batch_messages: 4
  ingress_max_batch_items: 24
  summon_keywords:
    - 月见
    - Selrena
    - selrena
    - 小月见
  focus_on_any_chat: false

multimodal:
  enabled: true
  strategy: "specialist_then_core"
  max_items: 6
  core_model: "deepseek/chat"
  image_model: "qwen/vision"
  video_model: "qwen/vision"

action_stream:
  enabled: true
  channel: "live2d"
