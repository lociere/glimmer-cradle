<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>微光摇篮 Personal Server</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <div class="login-layer" id="login-layer" hidden>
    <form class="login-panel" id="login-form">
      <span class="brand-mark" aria-hidden="true">G</span>
      <h1>连接微光摇篮</h1>
      <p>输入部署时生成的访问令牌。</p>
      <input class="visually-hidden" name="username" value="personal-server" autocomplete="username" tabindex="-1" aria-hidden="true">
      <label for="access-token">访问令牌</label>
      <input id="access-token" name="token" type="password" autocomplete="current-password" required>
      <button type="submit">连接</button>
      <output id="login-message" aria-live="polite"></output>
    </form>
  </div>

  <div class="app-shell" id="app-shell" hidden>
    <header class="titlebar">
      <button class="brand-button" type="button" aria-label="对话" data-view="conversation">G</button>
      <div class="title-context"><span id="title-section">对话</span><strong id="title-page">当前对话</strong></div>
      <div class="connection-state"><i id="connection-dot"></i><span id="connection-label">连接中</span></div>
    </header>

    <aside class="rail" aria-label="主导航">
      <button class="rail-button is-active" type="button" data-view="conversation" aria-label="对话">对</button>
      <button class="rail-button" type="button" data-view="system" aria-label="系统状态">态</button>
      <button class="rail-button" type="button" data-view="extensions" data-product-feature="extensions" aria-label="扩展">扩</button>
      <button class="rail-button rail-bottom" id="logout-button" type="button" aria-label="退出">退</button>
    </aside>

    <aside class="section-pane">
      <div class="pane-heading"><span id="pane-eyebrow">对话</span><h2 id="pane-title">对话</h2></div>
      <nav>
        <button class="section-link is-active" type="button" data-view="conversation"><span>当前对话</span><i>›</i></button>
        <button class="section-link" type="button" data-view="system"><span>系统状态</span><i>›</i></button>
        <button class="section-link" type="button" data-view="extensions" data-product-feature="extensions"><span>扩展</span><i>›</i></button>
      </nav>
      <div class="pane-status"><i id="pane-status-dot"></i><div><strong id="pane-status-label">连接中</strong><span>Personal Server</span></div></div>
    </aside>

    <main class="workspace">
      <section class="workspace-view is-active" id="conversation-view">
        <header class="workspace-head"><div><span>对话</span><h1>当前对话</h1></div><button class="quiet-button" id="clear-button" type="button">清空界面</button></header>
        <div class="message-list" id="message-list" aria-live="polite">
          <div class="empty-state" id="empty-state"><span>G</span><h2>开始一段对话</h2><p>消息会进入同一个长期连续对话流。</p></div>
        </div>
        <div class="thinking-state" id="thinking-state" hidden>正在思考</div>
        <form class="composer" id="composer-form">
          <textarea id="message-input" rows="1" maxlength="8000" placeholder="和当前角色说点什么…" aria-label="消息"></textarea>
          <button id="send-button" type="submit">发送</button>
        </form>
      </section>

      <section class="workspace-view" id="system-view" hidden>
        <header class="workspace-head"><div><span>系统</span><h1>运行状态</h1></div><button class="quiet-button" id="refresh-button" type="button">刷新</button></header>
        <div class="system-summary"><div><span>服务状态</span><strong id="ready-summary">正在读取</strong></div><div><span>更新时间</span><strong id="ready-time">--</strong></div></div>
        <div class="runtime-list" id="runtime-list"></div>
      </section>

      <section class="workspace-view extension-view" id="extensions-view" hidden>
        <header class="workspace-head"><div><span>能力</span><h1>扩展</h1></div><button class="quiet-button" id="extension-refresh-button" type="button">刷新</button></header>
        <div class="extension-scroll">
          <section class="extension-install-section">
            <div><span>扩展来源</span><h2>安装扩展</h2><p>Personal Server 只接受可验证的远程发布来源，不读取服务器本地文件路径。</p></div>
            <form class="extension-install-form" id="extension-install-form">
              <label>来源<select id="extension-source-kind"><option value="registry">审核目录</option><option value="repository">仓库 Release</option><option value="release_manifest">Release Manifest</option></select></label>
              <label id="extension-primary-label">目录地址<input id="extension-primary-input" type="url" placeholder="https://.../catalog.json" required></label>
              <label id="extension-secondary-label">扩展 ID<input id="extension-secondary-input" placeholder="publisher.extension" required></label>
              <label id="extension-channel-label">通道<select id="extension-channel-input"><option value="stable">Stable</option><option value="beta">Beta</option><option value="nightly">Nightly</option></select></label>
              <button type="submit">检查来源</button>
            </form>
            <output id="extension-install-message" aria-live="polite"></output>
            <div class="extension-preview" id="extension-preview" hidden>
              <div><span>安装确认</span><h3 id="extension-preview-name"></h3><p id="extension-preview-trust"></p></div>
              <dl id="extension-preview-details"></dl>
              <div class="extension-preview-actions"><button class="quiet-button" id="extension-cancel-button" type="button">取消</button><button id="extension-commit-button" type="button">确认权限并安装</button></div>
            </div>
          </section>
          <section class="extension-directory-section"><div><span>已安装</span><h2>扩展目录</h2></div><div class="runtime-list" id="extension-list"></div></section>
        </div>
      </section>
    </main>

    <aside class="inspector">
      <div class="inspector-heading"><span>当前上下文</span><h2 id="inspector-title">Personal Server</h2></div>
      <section><span>连接</span><strong class="status-line"><i id="inspector-dot"></i><b id="inspector-connection">连接中</b></strong></section>
      <section id="tts-section"><span>语音生成</span><strong id="tts-state">未启用</strong></section>
      <section id="asr-section"><span>语音识别</span><strong id="asr-state">未启用</strong></section>
      <footer><span>产品形态</span><strong id="product-name">Personal Server</strong></footer>
    </aside>
  </div>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>
