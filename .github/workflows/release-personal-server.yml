name: 发布 Personal Server

concurrency:
  group: release-personal-server-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 配置 pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: 配置 Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 配置 uv 与 Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.28'
          python-version: '3.12.13'

      - name: 执行发布门禁
        run: |
          test "$(node -p 'require("./package.json").version')" = "${GITHUB_REF_NAME#v}"
          pnpm install --frozen-lockfile
          pnpm sync:contracts
          git diff --exit-code
          pnpm check:encoding
          pnpm test
          pnpm typecheck
          pnpm build

      - name: 配置 Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: 登录 GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并发布 OCI 镜像
        id: build_image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: deploy/personal-server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/glimmer-cradle-personal-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/glimmer-cradle-personal-server:latest
          provenance: mode=max
          sbom: true

      - name: 生成部署发布包
        id: release_metadata
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/glimmer-cradle-personal-server:${GITHUB_REF_NAME}@${{ steps.build_image.outputs.digest }}"
          docker pull "$IMAGE"
          DIGEST="${{ steps.build_image.outputs.digest }}"
          DIGEST_HEX="${DIGEST#sha256:}"
          ARCHIVE_IMAGE="glimmer-cradle/personal-server:release-v${VERSION}-${DIGEST_HEX:0:12}"
          docker tag "$IMAGE" "$ARCHIVE_IMAGE"
          IMAGE_ID="$(docker image inspect --format '{{.Id}}' "$ARCHIVE_IMAGE")"
          docker save --output personal-server-linux-amd64.tar "$ARCHIVE_IMAGE"
          ./deploy/personal-server/package-release.sh "$VERSION" dist/personal-server "$IMAGE" personal-server-linux-amd64.tar "$ARCHIVE_IMAGE" "$IMAGE_ID"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 验证 OCI 入口组件
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/glimmer-cradle-personal-server:${GITHUB_REF_NAME}@${{ steps.build_image.outputs.digest }}"
          test "$(docker run --rm --entrypoint /usr/local/bin/caddy "$IMAGE" version | awk '{print $1}')" = 'v2.10.2'

      - name: 验证部署发布包
        run: |
          cd dist/personal-server
          sha256sum --check SHA256SUMS
          test -f "glimmer-cradle-personal-server-v${{ steps.release_metadata.outputs.version }}-linux-amd64.tar.gz"
          test -f "glimmer-cradle-personal-server-v${{ steps.release_metadata.outputs.version }}-linux-amd64-full.tar.gz"
          test -x glimmer-cradle-installer.sh
          test -s release-notes.md
          PACKAGE="glimmer-cradle-personal-server-v${{ steps.release_metadata.outputs.version }}-linux-amd64.tar.gz"
          tar -tzf "$PACKAGE" \
            | grep -qx 'glimmer-cradle-personal-server/VERSION'
          mkdir extracted
          tar -xzf "$PACKAGE" -C extracted
          ENV_FILE=extracted/glimmer-cradle-personal-server/.env.example
          APP_IMAGE="$(grep '^GLIMMER_CRADLE_IMAGE=' "$ENV_FILE" | cut -d= -f2-)"
          CADDY_IMAGE="$(grep '^GLIMMER_CRADLE_CADDY_IMAGE=' "$ENV_FILE" | cut -d= -f2-)"
          test "$APP_IMAGE" = "$CADDY_IMAGE"
          docker compose \
            --project-directory extracted/glimmer-cradle-personal-server \
            --env-file "$ENV_FILE" \
            --file extracted/glimmer-cradle-personal-server/compose.yaml \
            config --quiet
          FULL_PACKAGE="glimmer-cradle-personal-server-v${{ steps.release_metadata.outputs.version }}-linux-amd64-full.tar.gz"
          tar -tzf "$FULL_PACKAGE" | grep -qx 'glimmer-cradle-personal-server/images/personal-server-linux-amd64.tar'
          tar -xOf "$FULL_PACKAGE" glimmer-cradle-personal-server/images/IMAGE | grep -qxF "$APP_IMAGE"
          ARCHIVE_IMAGE="$(tar -xOf "$FULL_PACKAGE" glimmer-cradle-personal-server/images/ARCHIVE_IMAGE)"
          ARCHIVE_IMAGE_ID="$(tar -xOf "$FULL_PACKAGE" glimmer-cradle-personal-server/images/IMAGE_ID)"
          ! tar -tzf "$FULL_PACKAGE" | grep -Eqi '(^|/)(secrets\.yaml|data|logs?|cache|backups?|models?)(/|$)|\.(live2d|moc3)$'
          tar -xOf "$PACKAGE" glimmer-cradle-personal-server/RELEASE-MANIFEST.sha256 > light-manifest.sha256
          tar -xOf "$FULL_PACKAGE" glimmer-cradle-personal-server/RELEASE-MANIFEST.sha256 > full-manifest.sha256
          cmp light-manifest.sha256 full-manifest.sha256
          tar -xOf "$FULL_PACKAGE" glimmer-cradle-personal-server/images/personal-server-linux-amd64.tar > image-archive.tar
          docker image rm "$ARCHIVE_IMAGE" >/dev/null
          docker load --input image-archive.tar >/dev/null
          test "$(docker image inspect --format '{{.Id}}' "$ARCHIVE_IMAGE")" = "$ARCHIVE_IMAGE_ID"

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: Glimmer Cradle ${{ steps.release_metadata.outputs.version }}
          body_path: dist/personal-server/release-notes.md
          fail_on_unmatched_files: true
          files: |
            dist/personal-server/glimmer-cradle-personal-server-v*-linux-amd64.tar.gz
            dist/personal-server/glimmer-cradle-personal-server-v*-linux-amd64-full.tar.gz
            dist/personal-server/glimmer-cradle-installer.sh
            dist/personal-server/SHA256SUMS
